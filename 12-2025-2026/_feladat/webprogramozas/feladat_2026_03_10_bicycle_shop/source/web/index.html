<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJIT - Vite</title>
</head>

<body class="bg-amber-200">
  <div class="grid grid-cols-2 gap-2">

    <h1 class="text-4xl text-center my-4">Kerékpárbolt</h1>
    <button class="px-5 py-2 rounded-xl bg-green-800 text-white self-center
                 hover:bg-green-700
                 transition-all duration-200 shadow-md mx-4" id="add-button">Új kerékpár</button>
  </div>

  <div id="bicycles" class="grid md:grid-cols-2 lg:grid-cols-4 gap-4 p-6 shadow-2xs"></div>

  <template id="bicycle-card">
    <div class="card bg-white rounded-md">
      <img src="/images/1.jpg" alt="MTB kerékpár ST 530 S, 27,5”, fekete, piros">
      <div class="p-4">
        <h3 class="font-semibold">MTB kerékpár ST 530 S, 27,5”, fekete, piros</h3>
        <p class="font-bold my-4">Ár: 229&nbsp;990&nbsp;Ft</p>
        <div class="grid grid-cols-2 gap-2">
          <button class="details col-span-full px-5 py-2 rounded-xl bg-gray-800 text-white
                 hover:bg-gray-700
                 transition-all duration-200 shadow-md">Részletek</button>
          <button class="edit px-5 py-2 rounded-xl bg-gray-800 text-white
                 hover:bg-gray-700
                 transition-all duration-200 shadow-md">Szerkesztés</button>
          <button class="delete px-5 py-2 rounded-xl bg-red-800 text-white
                 hover:bg-red-700
                 transition-all duration-200 shadow-md">Törlés</button>
        </div>

      </div>
    </div>
  </template>

  <dialog id="bicycle-form-dialog" class="m-auto w-full max-w-4xl rounded-2xl p-0
         shadow-2xl bg-white
         backdrop:bg-black/50 backdrop:backdrop-blur-sm">

    <div class="p-8">


      <h1 class="text-2xl font-bold text-gray-800 mb-6">
        Új kerékpár
      </h1>

      <form id="bicycle-form" class="grid md:grid-cols-3 gap-4">


        <div class="col-span-full">
          <label for="manufacturer" class="block text-sm font-medium text-gray-700 mb-1">
            Gyártó
          </label>
          <input type="text" id="manufacturer" name="manufacturer" required class="w-full rounded-xl border border-gray-300 px-3 py-2
                 focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent">
        </div>

        <div class="col-span-full">
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
            Név
          </label>
          <input type="text" id="name" name="name" required class="w-full rounded-xl border border-gray-300 px-3 py-2
                 focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent">
        </div>


        <div class="col-span-3 md:col-span-1">
          <label for="wheel_size" class="block text-sm font-medium text-gray-700 mb-1">
            Kerékméret
          </label>
          <input type="number" step="0.1" id="wheel_size" name="wheel_size" required class="w-full rounded-xl border border-gray-300 px-3 py-2
                 focus:outline-none focus:ring-2 focus:ring-gray-800">
        </div>


        <div class="col-span-3 md:col-span-1">
          <label for="speed" class="block text-sm font-medium text-gray-700 mb-1">
            Sebesség
          </label>
          <input type="number" id="speed" name="speed" required class="w-full rounded-xl border border-gray-300 px-3 py-2
                 focus:outline-none focus:ring-2 focus:ring-gray-800">
        </div>


        <div class="col-span-3 md:col-span-1">
          <span class="block text-sm font-medium text-gray-700 mb-2">
            Nem
          </span>

          <div class="flex gap-6">
            <label class="flex items-center gap-2">
              <input type="radio" name="sex" value="férfi" class="accent-gray-800">
              Férfi
            </label>

            <label class="flex items-center gap-2">
              <input type="radio" name="sex" value="női" class="accent-gray-800">
              Női
            </label>

            <label class="flex items-center gap-2">
              <input type="radio" name="sex" value="unisex" class="accent-gray-800">
              Unisex
            </label>
          </div>
        </div>


        <div class="col-span-3 md:col-span-1">
          <label for="type" class="block text-sm font-medium text-gray-700 mb-1">
            Típus
          </label>
          <select id="type" name="type" class="w-full rounded-xl border border-gray-300 px-3 py-2
                 focus:outline-none focus:ring-2 focus:ring-gray-800">
            <option value="">Kérem válasszon</option>
            <option value="MTB">MTB</option>
            <option value="városi" selected>városi</option>
          </select>
        </div>


        <div class="col-span-3 md:col-span-1">
          <label for="price" class="block text-sm font-medium text-gray-700 mb-1">
            Ár
          </label>
          <input type="number" id="price" name="price" required class="w-full rounded-xl border border-gray-300 px-3 py-2
                 focus:outline-none focus:ring-2 focus:ring-gray-800">
        </div>

        <div class="col-span-3 md:col-span-1">
          <label for="color" class="block text-sm font-medium text-gray-700 mb-1">
            Szín
          </label>
          <input type="text" id="color" name="color" required class="w-full rounded-xl border border-gray-300 px-3 py-2
                 focus:outline-none focus:ring-2 focus:ring-gray-800">
        </div>


        <div class="md:col-span-3 flex justify-end gap-3 mt-4">

          <form method="dialog">
            <button type="button" class="px-5 py-2 rounded-xl bg-gray-200 text-gray-700
                   hover:bg-gray-300 transition">
              Bezárás
            </button>
          </form>

          <button type="submit" class="px-6 py-2 rounded-xl bg-gray-800 text-white
                 hover:bg-gray-700 active:scale-95
                 transition shadow-md">
            Mentés
          </button>

        </div>

      </form>

    </div>
  </dialog>


  <dialog id="bicycle-dialog" class="backdrop:bg-black/50 backdrop:backdrop-blur-sm
         p-0 rounded-2xl shadow-2xl m-auto w-full max-w-4xl
         bg-white overflow-hidden">

    <div class="flex flex-col md:flex-row">


      <div class="md:w-1/2 bg-gray-100">
        <img src="images/2.jpg" alt="MTB kerékpár" class="w-full h-full object-cover">
      </div>


      <div class="md:w-1/2 p-6 flex flex-col justify-between">

        <div>
          <h1 class="text-2xl font-bold text-gray-800 mb-4">
            MTB kerékpár ST 50, 26”, fekete
          </h1>

          <ul class="details space-y-2 text-gray-600">
            <li><span class="font-semibold text-gray-800">Kerék méret:</span> 26 col</li>
            <li><span class="font-semibold text-gray-800">Váltó:</span> 21 sebességes</li>
            <li><span class="font-semibold text-gray-800">Nem:</span> férfi</li>
            <li><span class="font-semibold text-gray-800">Típus:</span> MTB</li>
            <li><span class="font-semibold text-gray-800">Szín:</span> fekete</li>
            <li><span class="font-semibold text-gray-800">Ár:</span> 99 990 Ft</li>
          </ul>
        </div>


        <form class="mt-6 text-right" method="dialog">
          <button type="submit" id="close-bicycle-button" class="px-5 py-2 rounded-xl bg-gray-800 text-white
                 hover:bg-gray-700
                 transition-all duration-200 shadow-md">
            Bezárás
          </button>
        </form>

      </div>
    </div>

  </dialog>


  <dialog id="confirm-dialog" class="backdrop:bg-black/50 backdrop:backdrop-blur-sm
         p-0 rounded-2xl shadow-2xl m-auto w-full max-w-4xl
         bg-white overflow-hidden">

    <div class="flex flex-col md:flex-row p-4">

      <form class="w-full">


        <h2 class="col-span-full font-bold text-4xl mb-2">Kerékpár</h2>

        <p>Biztos ki szeretnéd törölni ezt a kerékpárt?</p>

        <div class="flex justify-end gap-2 w-full my-2">
          <button type="button" class="cancel px-5 py-2 rounded-xl bg-gray-800 text-white
                 hover:bg-gray-700
                 transition-all duration-200 shadow-md">Mégse</button>
          <button class="delete px-5 py-2 rounded-xl bg-red-800 text-white
                 hover:bg-red-700
                 transition-all duration-200 shadow-md">Törlés</button>
        </div>

      </form>
    </div>

  </dialog>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
