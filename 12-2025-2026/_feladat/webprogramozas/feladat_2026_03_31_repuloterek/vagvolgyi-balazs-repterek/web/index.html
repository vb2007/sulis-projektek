<!doctype html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Repülőterek</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="./src/main.js" type="module" defer></script>
        <script src="./src/assets/js/bases.js" type="module" defer></script>
    </head>
    <body class="bg-slate-50 min-h-screen p-4 md:p-10">
        <div class="max-w-6xl mx-auto">
            <header class="mb-10">
                <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">Repülőterek</h1>
                <p class="text-slate-500 mt-2">Dinamikus adatkezelés JSON szerverrel</p>
            </header>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-10">
                <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center">
                    <span class="bg-blue-600 w-2 h-6 rounded-full mr-3"></span>
                    Új bázis rögzítése
                </h2>
                <form id="baseForm" class="grid grid-cols-1 md:grid-cols-4 gap-5">
                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-slate-600 ml-1">Város</label>
                        <input
                            type="text"
                            id="city"
                            name="city"
                            required
                            placeholder="Pl. Budapest"
                            class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                        />
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-slate-600 ml-1">ICAO Kód</label>
                        <input
                            type="text"
                            id="icao_airport_code"
                            name="icao_airport_code"
                            required
                            placeholder="Pl. LHBP"
                            class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                        />
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-slate-600 ml-1">Légitársaság ID</label>
                        <input
                            type="text"
                            id="airline_id"
                            name="airline_id"
                            required
                            placeholder="1, 2, 3..."
                            class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                        />
                    </div>
                    <div class="flex items-end">
                        <button
                            type="submit"
                            class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 rounded-lg transition-colors shadow-lg shadow-slate-200"
                        >
                            Mentés
                        </button>
                    </div>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-800 text-slate-200">
                            <th class="px-6 py-4 font-semibold uppercase text-xs tracking-wider">Város</th>
                            <th class="px-6 py-4 font-semibold uppercase text-xs tracking-wider">ICAO / Futópálya</th>
                            <th class="px-6 py-4 font-semibold uppercase text-xs tracking-wider">Légitársaság</th>
                        </tr>
                    </thead>
                    <tbody id="baseTableBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </body>
</html>
